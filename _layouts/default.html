<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-logo">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/about' | relative_url }}" class="nav-link">自己紹介</a>
        <a href="{{ '/projects' | relative_url }}" class="nav-link">プロジェクト</a>
        <a href="{{ '/blog' | relative_url }}" class="nav-link">ブログ</a>
        <button id="theme-toggle" class="theme-toggle-button" aria-label="Toggle theme">
          <!-- Icon will be added by JS -->
          ☀️
        </button>
      </nav>
    </div>
  </header>

  <div class="content-wrapper">
    <div class="container">
      {{ content }}
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-info">
          <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
          <p>連絡先: {{ site.social_links.email }}</p>
        </div>
        <div class="footer-social">
          <a href="https://github.com/{{ site.social_links.github }}" target="_blank" rel="noopener" class="social-link">GitHub</a>
          <a href="https://twitter.com/{{ site.social_links.twitter }}" target="_blank" rel="noopener" class="social-link">Twitter</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
</body>
</html>
